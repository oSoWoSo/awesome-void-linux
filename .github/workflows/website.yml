name: Build GitHub Pages from md files

on:
  push:
    branches:
      - main
    paths:
      - '*.md'
      - 'docs/*'
      - .github/workflows/website.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: 🛎️ Checkout (as bot)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Create docs directory
        run: mkdir -p docs

      - name: Make pages
        run: |
          chmod a+x create-web
          ./create-web build
      
      - name: 🤖 Commit as GitHub App
        run: |
          git config user.name "oSowoSo.bot"
          git config user.email "osowoso@disroot.org"

          git add docs/*
          git diff --cached --quiet || git commit -m "Update website"
          git push

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'docs/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
